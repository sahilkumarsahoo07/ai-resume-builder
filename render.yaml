services:
  # Backend: Node.js (with Docker for Puppeteer)
  - type: web
    name: ai-resume-builder-server
    runtime: docker
    rootDir: server
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

  # Frontend: Vite (Static Site)
  - type: static
    name: ai-resume-builder-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ai-resume-builder-server.onrender.com/api
